<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注音巨大字卡反應爐</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 5px;
            color: #ecf0f1;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .tip {
            color: #bdc3c7;
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .card-container {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }
        .card {
            width: 220px;
            height: 300px;
            background: linear-gradient(135deg, #ff7675, #d63031);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 120px;
            font-weight: bold;
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 4px solid #ffffff;
            transition: all 0.3s ease;
        }
        .card.active {
            background: linear-gradient(135deg, #ffffff, #f5f6fa);
            color: #2c3e50;
            border: 4px solid #00cec9;
            transform: scale(1.05);
        }
        .control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #actionBtn {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #00cec9;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        #actionBtn:hover {
            background-color: #00b894;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
        }
        #actionBtn:disabled {
            background-color: #74b9ff;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #timerDisplay {
            font-size: 48px;
            font-weight: bold;
            color: #ffeaa7;
            height: 60px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>注音造詞挑戰</h1>
    <p class="tip">規則：按下按鈕後倒數 5 秒，字卡翻開時請立刻進行造詞！</p>

    <div class="card-container">
        <div id="card1" class="card">?</div>
        <div id="card2" class="card">?</div>
    </div>

    <div class="control-panel">
        <button id="actionBtn" onclick="startPreCountDown()">開始倒數</button>
        <div id="timerDisplay"></div>
    </div>

    <script>
        // 只保留最上面的 21 個「聲母」注音符號
        const zhuyinPool = [
            'ㄅ', 'ㄆ', 'ㄇ', 'ㄈ', 'ㄉ', 'ㄊ', 'ㄋ', 'ㄌ', 
            'ㄍ', 'ㄎ', 'ʰ', 'ㄐ', 'ㄑ', 'ㄒ', 'ㄓ', 'ㄔ', 
            'ㄕ', 'ㄖ', 'ㄗ', 'ㄘ', 'ㄙ'
        ];

        // 修正上方可能因字型產生的萬國碼顯示問題，改用標準中文字型定義
        zhuyinPool[10] = 'ㄏ'; 

        let countdownInterval;

        function startPreCountDown() {
            const btn = document.getElementById('actionBtn');
            const timer = document.getElementById('timerDisplay');
            const card1 = document.getElementById('card1');
            const card2 = document.getElementById('card2');

            // 1. 鎖定按鈕，重置字卡狀態
            btn.disabled = true;
            btn.innerText = "倒數中...";
            
            card1.innerText = "?";
            card1.classList.remove('active');
            card2.innerText = "?";
            card2.classList.remove('active');

            // 2. 開始前置 5 秒倒數
            let timeLeft = 5;
            timer.style.color = "#ffeaa7";
            timer.innerText = `準備開始...${timeLeft}`;

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timer.innerText = `準備開始...${timeLeft}`;
                } else {
                    clearInterval(countdownInterval);
                    
                    // 3. 時間到！隨機抽取並翻開字卡
                    let shuffled = [...zhuyinPool].sort(() => 0.5 - Math.random());
                    
                    card1.innerText = shuffled[0];
                    card1.classList.add('active');
                    card2.innerText = shuffled[1];
                    card2.classList.add('active');

                    // 4. 更新提示狀態，解鎖按鈕
                    timer.style.color = "#00cec9";
                    timer.innerText = "開始造詞！💨";
                    
                    btn.disabled = false;
                    btn.innerText = "下一題預備";
                }
            }, 1000);
        }
    </script>
</body>
</html>
